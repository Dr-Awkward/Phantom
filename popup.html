<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }

    .header {
      background: linear-gradient(135deg, #161b22, #1a2332);
      padding: 16px;
      border-bottom: 1px solid #30363d;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .header .subtitle {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    .toggle-section {
      padding: 16px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #21262d;
    }

    .toggle-row:last-child { border-bottom: none; }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle-desc {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #c9d1d9;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider {
      background: #238636;
    }

    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }

    .stats-section {
      padding: 12px 16px;
      background: #161b22;
      border-top: 1px solid #30363d;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-item {
      background: #0d1117;
      border-radius: 6px;
      padding: 8px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #58a6ff;
    }

    .stat-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .persona-badge {
      display: inline-block;
      background: #1f2937;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      color: #7ee787;
      margin-top: 8px;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
    }

    .footer a {
      font-size: 11px;
      color: #58a6ff;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover { text-decoration: underline; }

    .update-banner {
      background: #1a2332;
      border-top: 1px solid #1f6feb;
      padding: 8px 16px;
      text-align: center;
    }

    .update-banner a {
      font-size: 12px;
      color: #58a6ff;
      text-decoration: none;
      cursor: pointer;
    }

    .update-banner a:hover { text-decoration: underline; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status-dot.active { background: #3fb950; }
    .status-dot.inactive { background: #f85149; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span class="status-dot active" id="statusDot"></span>Phantom</h1>
    <div class="subtitle">Behavioral Noise Engine</div>
  </div>

  <div class="toggle-section">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Ghost Searches</div>
        <div class="toggle-desc">Decoy search queries</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="searchToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">Phantom Engine</div>
        <div class="toggle-desc">Behavioral noise injection</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="phantomToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="stats-section">
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="ghostEvents">-</div>
        <div class="stat-label">Ghost Events</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="phantomClicks">-</div>
        <div class="stat-label">Phantom Clicks</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="scrollSpoofs">-</div>
        <div class="stat-label">Scroll Spoofs</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="queryPool">-</div>
        <div class="stat-label">Query Pool</div>
      </div>
    </div>
    <div class="persona-badge" id="personaBadge">Persona: ---</div>
  </div>

  <div class="update-banner" id="updateBanner" style="display:none;">
    <a id="updateLink">Update available — click to download</a>
  </div>

  <div class="footer">
    <a id="dashboardLink">Exposure Dashboard</a>
    <a id="optionsLink">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
